<!DOCTYPE html>
<html>
<head>
<title>ReplyFast</title>
<link rel="stylesheet" href="style.css">
<script src="script.js?v=5" defer></script>
</head>
<body>

<div class="app">
<div class="wrapper">

<section class="hero">
<h1 class="brand">ReplyFast</h1>
<p>Reply instantly</p>
<p>No typing. No thinking</p>
<p class="big">Tap. Copy. Send</p>
<p>What do you need to say right now?</p>
</section>

<div id="categories" class="stack"></div>
<div id="situations" class="stack"></div>
<div id="replies"></div>

<button id="tryAnotherBtn" onclick="resetFlow()" style="display:none; margin-top:20px;">
Try another →
</button>

<p id="copiedMsg" style="display:none; margin-top:10px;">
Copied ✓ Message ready to send
</p>

<hr>

<p>Get notified when this launches</p>

<input id="email" placeholder="email">

<label>
<input type="checkbox" id="notbot"> Not a bot
</label>

<br><br>

<button onclick="saveEmail()">Notify me</button>

<p id="notifyMsg" style="display:none; opacity:0.7; margin-top:10px;"></p>

<hr>

<p>Fast replies</p>
<p>Real conversations</p>
<p>No friction</p>

<footer class="footer">
ReplyFast by Elayro • Built for speed • © 2026
</footer>

</div>
</div>

</body>
</html>
