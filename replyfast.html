<section class="section reveal">

<a href="index.html" class="cta-link">← Elayro</a>

<h1>ReplyFast</h1>
<p class="tagline">Reply instantly.</p>

<div class="instant-box">
<div class="reply-card demo-reply">Running a bit late — will update shortly.</div>
</div>

<p id="progressText" class="small">0/3 selected</p>

<div class="options" id="who">
<button class="magnetic" onclick="selectOption('who','work',event)">Work</button>
<button class="magnetic" onclick="selectOption('who','friend',event)">Friend</button>
<button class="magnetic" onclick="selectOption('who','client',event)">Client</button>
</div>

<div class="options" id="situation">
<button class="magnetic" onclick="selectOption('situation','update',event)">Update</button>
<button class="magnetic" onclick="selectOption('situation','delay',event)">Delay</button>
<button class="magnetic" onclick="selectOption('situation','meeting',event)">Meeting</button>
</div>

<div class="options" id="tone">
<button class="magnetic" onclick="selectOption('tone','formal',event)">Formal</button>
<button class="magnetic" onclick="selectOption('tone','casual',event)">Casual</button>
</div>

<div id="aiOutput" class="ai-output">
<span class="small">Select options to generate replies</span>
</div>

<div class="waitlist">
<input type="email" id="emailInput" placeholder="Early access email">
<input type="text" id="honeypot" style="display:none">
<button id="accessBtn" onclick="joinWaitlist()" disabled>Get Access</button>
</div>

<label class="small">
<input type="checkbox" id="humanCheck"> I’m not a bot
</label>

<p id="waitlistMsg" class="small"></p>

</section>

<script src="script.js"></script>
