<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReplyFast</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>

<section class="section">
<div class="container narrow">

<a href="/index.html" class="back">← Elayro</a>

<h1>ReplyFast</h1>
<p class="sub">Tap. Copy. Send.</p>

<p id="progressText" class="small">0/3 selected</p>

<p class="small">Who is this for?</p>
<div class="options" id="who">
<button onclick="selectOption('who','work',event)">Work</button>
<button onclick="selectOption('who','friend',event)">Friend</button>
<button onclick="selectOption('who','client',event)">Client</button>
</div>

<p class="small">What happened?</p>
<div class="options" id="situation">
<button onclick="selectOption('situation','update',event)">Update</button>
<button onclick="selectOption('situation','delay',event)">Delay</button>
<button onclick="selectOption('situation','meeting',event)">Meeting</button>
</div>

<p class="small">Tone</p>
<div class="options" id="tone">
<button onclick="selectOption('tone','formal',event)">Formal</button>
<button onclick="selectOption('tone','casual',event)">Casual</button>
</div>

<div id="aiOutput" class="ai-output">
<span class="small">Select all 3 options</span>
</div>

</div>
</section>

<footer class="footer">
<p>ReplyFast</p>
</footer>

<script src="/script.js"></script>
</body>
</html>
