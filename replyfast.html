<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReplyFast | Elayro</title>

  <!-- SEO Meta Tags -->
  <meta name="description" content="ReplyFast by Elayro delivers instant, context-aware replies in one click. Say it right, instantly.">
  <meta name="keywords" content="ReplyFast, Elayro, instant replies, communication engine, digital execution, fast messaging">
  <link rel="canonical" href="https://www.elayro.com/replyfast">

  <!-- Styles and Scripts -->
  <link rel="stylesheet" href="../global.css">
  <script src="../app.js" defer></script>

  <!-- Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "SoftwareApplication",
    "name": "ReplyFast",
    "operatingSystem": "Web",
    "applicationCategory": "CommunicationApplication",
    "description": "ReplyFast by Elayro delivers instant, context-aware replies in one click.",
    "url": "https://www.elayro.com/replyfast",
    "publisher": {
      "@type": "Organization",
      "name": "Elayro",
      "url": "https://www.elayro.com/"
    }
  }
  </script>
</head>
<body>

<header>
  <h1>ReplyFast</h1>
  <p class="punch">Say It Right. Instantly.</p>
  <p class="intro">ReplyFast delivers context‑aware replies in one click.</p>
  <p class="hook">One click. Infinite speed.</p>
</header>

<div class="divider"></div>

<main class="content">
  <section>
    <h2>Interaction</h2>

    <div class="audience">
      <h3>Audience</h3>
      <button class="btn audience-btn" data-value="Work">Work</button>
      <button class="btn audience-btn" data-value="Friend">Friend</button>
      <button class="btn audience-btn" data-value="Client">Client</button>
    </div>

    <div class="situation">
      <h3>Situation</h3>
      <div id="situations"></div>
    </div>

    <div class="replies">
      <h3>Replies</h3>
      <div id="replies"></div>
      <button class="btn" id="reset" style="display:none;">Try Another →</button>
    </div>
  </section>

  <div class="divider"></div>

  <section class="email-box">
    <h2>Stay Updated</h2>
    <input type="email" id="email" class="email-input" placeholder="Enter your email">
    <div>
      <input type="checkbox" id="botcheck"> 
      <label for="botcheck" class="checkbox">I am not a bot</label>
    </div>
    <button class="btn notify-btn" id="notify" disabled>Notify Me</button>
  </section>
</main>

<div class="divider"></div>

<footer class="footer-global">
  <div class="footer-content">
    <h3>ReplyFast by Elayro</h3>
    <p>Execution-speed communication.</p>
    <p><a href="mailto:contact@elayro.com" class="footer-link">contact@elayro.com</a></p>
    <p>2026 All rights reserved</p>
  </div>
</footer>

</body>
</html>
